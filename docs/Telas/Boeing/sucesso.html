<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Telas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container" style="background: #FFF;">
        <div class="box-header">
            <a href="./confirma.html"><</a>
            <span>CADASTRAR CONTA</span>
        </div>
        <div class="box-main">
            <h3>Complete as informações da sua conta</h3>
            <span>Cadastre seus dados para identificação de usuário e maior segurança na conta</span>
            <div class="box-input">
                <h5>Qual seu nome?</h5>
                <input type="text" name="name" id="name" placeholder="Nome e sobrenome">
            </div>
            <div class="box-input">
                <h5>Qual seu CPF?</h5>
                <input type="text" name="cpf" id="cpf" placeholder="CPF">
            </div>
            <div class="box-input">
                <h5>Qual sua senha?</h5>
                <input type="password" name="password" id="password" placeholder="Senha">
            </div>
        </div>
        <div class="button">
            <a href="#" class="">Continuar</a>
        </div>
    </div>
</body>
</html>
